<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'Plus Jakarta Sans', 'sans-serif'] }, colors: { darkBase: '#020617', darkPanel: '#09090b', brandRed: '#ef4444' } } } }
</script>
<style> 
  body { background-color: #09090b !important; color: #f8fafc !important; margin:0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
  .site-header, .site-footer, .page-title, .entry-header { display: none !important; }
  
  .neon-panel { background-color: #12121a; border: 1px solid #27272a; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  
  /* Custom Scrollbar */
  textarea::-webkit-scrollbar { width: 8px; }
  textarea::-webkit-scrollbar-track { background: transparent; }
  textarea::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
  textarea::-webkit-scrollbar-thumb:hover { background: #ef4444; }
</style>

<nav class="fixed top-0 left-0 w-full h-[70px] z-50 px-6 flex justify-between items-center bg-[#09090b]/95 backdrop-blur-xl border-b border-zinc-800">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 flex items-center justify-center bg-red-500/20 rounded-xl text-red-400 border border-red-500/30 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
            <i class="ph-fill ph-robot text-2xl"></i>
        </div>
        <div>
            <span class="text-[10px] text-red-400 font-bold block leading-none mb-1 uppercase tracking-wider">Premium Tool</span>
            <span class="text-lg font-black text-white leading-none">User Agent Shuffler</span>
        </div>
    </div>
    
    <button onclick="window.location.href='/?dashboard=true'" class="px-5 py-2.5 rounded-lg bg-zinc-900 border border-zinc-700 text-white hover:bg-red-500 hover:text-white hover:border-red-400 transition-all font-bold text-sm flex items-center gap-2">
        <i class="ph-bold ph-arrow-left"></i> <span class="hidden md:inline">Dashboard</span>
    </button>
</nav>

<div class="w-full min-h-screen pt-[100px] pb-10 px-4 md:px-6 flex flex-col lg:flex-row gap-6 max-w-[1600px] mx-auto">
    
    <div class="w-full lg:w-1/2 neon-panel flex flex-col relative overflow-hidden bg-[#09090b] border-t-2 border-t-red-500" style="min-height: 600px;">
        <div class="px-6 py-5 border-b border-zinc-800 flex justify-between items-center bg-[#12121a]">
            <h2 class="text-base font-bold text-white flex items-center gap-2"><i class="ph-bold ph-list-dashes text-red-400"></i> Paste User Agents Here</h2>
            <button onclick="clearInput()" class="text-xs text-zinc-500 hover:text-red-400 font-bold transition">Clear All</button>
        </div>
        
        <textarea id="uaInput" placeholder="Paste your sorted or mixed User Agents here (one per line)...&#10;&#10;Mozilla/5.0 (Windows NT 10.0; Win64; x64)...&#10;Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X)...&#10;Mozilla/5.0 (Linux; Android 13; SM-G991B)..." class="w-full flex-grow bg-[#020617] text-zinc-300 font-mono text-[12px] leading-loose p-6 md:p-8 outline-none resize-none whitespace-pre-wrap"></textarea>
        
        <div class="p-6 bg-[#12121a] border-t border-zinc-800 shrink-0">
            <button onclick="shuffleUAs()" class="w-full py-4 bg-gradient-to-r from-red-500 to-rose-600 text-white font-black text-lg rounded-xl hover:scale-[1.02] transition-transform shadow-[0_5px_20px_rgba(239,68,68,0.3)] flex justify-center items-center gap-2">
                <i class="ph-bold ph-arrows-down-up text-xl"></i> Shuffle & Mix Now
            </button>
        </div>
    </div>

    <div class="w-full lg:w-1/2 neon-panel flex flex-col relative overflow-hidden bg-[#09090b]" style="min-height: 600px;">
        
        <div class="px-6 py-5 border-b border-zinc-800 flex justify-between items-center bg-[#12121a] shrink-0">
            <h2 class="text-base font-bold text-white flex items-center gap-2"><i class="ph-bold ph-code text-red-400"></i> Shuffled Results (<span id="resCount" class="text-red-400 font-black">0</span>)</h2>
            <button onclick="copyOutput()" id="copyBtn" class="px-5 py-2 bg-zinc-800 hover:bg-red-500 hover:text-white text-white text-sm font-bold rounded-lg transition-colors flex items-center gap-2">
                <i class="ph-bold ph-copy"></i> Copy All
            </button>
        </div>
        
        <textarea id="outputArea" readonly placeholder="Mixed User Agents will appear here without changing any format..." class="w-full flex-grow bg-[#020617] text-red-400 font-mono text-[12px] leading-loose p-6 md:p-8 outline-none resize-none whitespace-pre-wrap shadow-inner"></textarea>
    </div>

</div>

<script>
    // Fisher-Yates (aka Knuth) Shuffle Algorithm
    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;

        // While there remain elements to shuffle.
        while (currentIndex != 0) {
            // Pick a remaining element.
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;

            // And swap it with the current element.
            [array[currentIndex], array[randomIndex]] = [
                array[randomIndex], array[currentIndex]];
        }

        return array;
    }

    function shuffleUAs() {
        const inputArea = document.getElementById('uaInput');
        const rawText = inputArea.value;
        
        if (!rawText.trim()) {
            alert("Please paste some User Agents to shuffle!");
            return;
        }

        // Split by new line, trim whitespace from ends, and remove empty lines
        const uaList = rawText.split('\n')
                              .map(ua => ua.trim())
                              .filter(ua => ua !== "");
        
        if (uaList.length === 0) return;

        // Perform the shuffle
        const shuffledList = shuffleArray(uaList);

        // Output exactly as they were (just in a different order)
        document.getElementById('outputArea').value = shuffledList.join('\n');
        document.getElementById('resCount').innerText = shuffledList.length;
        
        // Reset Copy Button
        const copyBtn = document.getElementById('copyBtn');
        copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i> Copy All';
        copyBtn.classList.remove('bg-green-500', 'text-white', 'border-transparent');
    }

    function copyOutput() {
        const txtArea = document.getElementById('outputArea');
        if (!txtArea.value) return;
        
        txtArea.select();
        navigator.clipboard.writeText(txtArea.value).then(() => {
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerHTML = '<i class="ph-bold ph-check"></i> Copied!';
            copyBtn.classList.add('bg-green-500', 'text-white', 'border-transparent');
        });
    }

    function clearInput() {
        document.getElementById('uaInput').value = '';
        document.getElementById('outputArea').value = '';
        document.getElementById('resCount').innerText = '0';
    }
</script>
