<script>
    (function() {
        const user = JSON.parse(localStorage.getItem('proToolsUser'));
        const now = new Date().getTime();

        if (!user || !user.isLoggedIn) {
            alert(" Please login to access premium tools!");
            window.location.replace("index.html");
        } else if (!user.plan || user.plan === 'Free') {
            alert(" Access Denied! Please enter a VIP code to unlock this tool.");
            window.location.replace("index.html"); 
        } else if (user.expiry && now > user.expiry) {
            alert(" Your premium access has expired! Please renew.");
            window.location.replace("index.html");
        }
    })();
</script>

    <script>
        // --- DYNAMIC BROWSER LOGIC ---
        function updateUI() {
            const device = document.querySelector('input[name="device"]:checked').value;
            
            const lblChrome = document.getElementById('lbl_br_chrome');
            const lblFirefox = document.getElementById('lbl_br_firefox');
            const lblEdge = document.getElementById('lbl_br_edge');
            const lblSafari = document.getElementById('lbl_br_safari');
            const lblOpera = document.getElementById('lbl_br_opera');

            // Reset display
            [lblChrome, lblFirefox, lblEdge, lblSafari, lblOpera].forEach(el => {
                if(el) el.style.display = 'none';
            });

            if (device === 'Android') {
                [lblChrome, lblFirefox, lblEdge, lblOpera].forEach(el => el.style.display = 'inline-flex');
                if(document.getElementById('br_safari').checked) {
                    document.getElementById('br_chrome').checked = true;
                }
            } else if (device === 'iPhone' || device === 'Mac') {
                // FIXED: Only Safari is shown for iPhone and Mac
                [lblSafari].forEach(el => el.style.display = 'inline-flex'); 
                document.getElementById('br_safari').checked = true;
            } else if (device === 'Windows') {
                [lblChrome, lblFirefox, lblEdge, lblOpera].forEach(el => el.style.display = 'inline-flex');
                if(document.getElementById('br_safari').checked) {
                    document.getElementById('br_chrome').checked = true;
                }
            } else if (device === 'Random Mix') {
                [lblChrome, lblFirefox, lblEdge, lblSafari, lblOpera].forEach(el => el.style.display = 'inline-flex');
                document.getElementById('br_chrome').checked = true;
            }
        }

        window.onload = updateUI;

        // --- STRICT DATABASE ---
        const ANDROID_MODELS = [
            // Samsung
            { brand: 'Samsung', model: 'SM-S938B', os: ['15', '16'] },
            { brand: 'Samsung', model: 'SM-S931B', os: ['15', '16'] },
            { brand: 'Samsung', model: 'SM-S928B', os: ['14', '15', '16'] },
            { brand: 'Samsung', model: 'SM-S921B', os: ['14', '15', '16'] },
            { brand: 'Samsung', model: 'SM-S918B', os: ['14', '15', '16'] },
            { brand: 'Samsung', model: 'SM-S901B', os: ['14', '15', '16'] },
            { brand: 'Samsung', model: 'SM-F966B', os: ['15', '16'] },
            { brand: 'Samsung', model: 'SM-A556B', os: ['14', '15', '16'] },
            // Google
            { brand: 'Google', model: 'Pixel 10 Pro', os: ['15', '16'] },
            { brand: 'Google', model: 'Pixel 9 Pro XL', os: ['14', '15', '16'] },
            { brand: 'Google', model: 'Pixel 8 Pro', os: ['14', '15', '16'] },
            { brand: 'Google', model: 'Pixel 7 Pro', os: ['14', '15', '16'] },
            // Motorola
            { brand: 'Motorola', model: 'motorola edge 50 ultra', os: ['14', '15', '16'] },
            { brand: 'Motorola', model: 'XT2403-2', os: ['14', '15', '16'] },
            { brand: 'Motorola', model: 'XT2301-5', os: ['14', '15', '16'] },
            // OnePlus
            { brand: 'OnePlus', model: 'OnePlus 13', os: ['15', '16'] },
            { brand: 'OnePlus', model: 'CPH2581', os: ['14', '15', '16'] },
            { brand: 'OnePlus', model: 'CPH2449', os: ['14', '15', '16'] },
            // Xiaomi
            { brand: 'Xiaomi', model: 'Xiaomi 15 Pro', os: ['15', '16'] },
            { brand: 'Xiaomi', model: '24030PN60G', os: ['14', '15', '16'] },
            { brand: 'Xiaomi', model: '23127PN0CG', os: ['14', '15', '16'] },
            // Oppo
            { brand: 'Oppo', model: 'Find X7 Ultra', os: ['14', '15', '16'] },
            { brand: 'Oppo', model: 'CPH2529', os: ['14', '15', '16'] },
            { brand: 'Oppo', model: 'CPH2499', os: ['14', '15', '16'] },
            // Vivo
            { brand: 'Vivo', model: 'X100 Pro', os: ['14', '15', '16'] },
            { brand: 'Vivo', model: 'V2308', os: ['14', '15', '16'] },
            { brand: 'Vivo', model: 'V2250', os: ['14', '15', '16'] }
        ];

        const IPHONE_MODELS = [
            'iPhone17,1', 'iPhone17,2', 'iPhone16,1', 'iPhone16,2',
            'iPhone15,2', 'iPhone15,3', 'iPhone14,7', 'iPhone14,2'
        ];
        
        // STRICT VERSIONS
        const IOS_OS_VERSIONS = ['26_0_1', '26_5_2', '26_1', '26_5_1', '26_0_2']; 
        const MAC_VERSIONS = []; 
        const WIN_VERSIONS = ['Windows NT 10.0; Win64; x64', 'Windows NT 11.0; Win64; x64'];

        const BROWSERS = {
            'ChromeMobile': '150.0.7871.61', 
            'ChromePC': '150.0.0.0',         
            'Edge': '150.0.4078.50',
            'Opera': '133.0.5932.25',
            'Firefox': '152.0.5',
            'Safari': '26.0.1'               
        };

        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        function generateAndroidBuild() {
            const prefixes = ['UP1A', 'TP1A', 'SP1A', 'UKQ1', 'RP1A', 'CP1A', 'BP1A', 'AP3A'];
            const year = randInt(24, 26);
            const month = String(randInt(1, 12)).padStart(2, '0');
            const day = String(randInt(1, 28)).padStart(2, '0');
            const revision = String(randInt(1, 999)).padStart(3, '0');
            return `${rand(prefixes)}.${year}${month}${day}.${revision}`;
        }

        function generateIOSBuild() {
            const buildMajor = randInt(14, 25);
            const buildLetter = String.fromCharCode(65 + Math.floor(Math.random() * 26)); // A-Z
            const buildMinor = randInt(10, 999);
            return `${buildMajor}${buildLetter}${buildMinor}`; // e.g., 15E148
        }

        function generateUAs() {
            const qty = parseInt(document.getElementById('uaQty').value) || 10;
            const deviceSelection = document.querySelector('input[name="device"]:checked').value;
            let browser = document.querySelector('input[name="browser"]:checked').value;

            // Use Array to ensure exact quantity
            const generatedUAs = [];
            const mixDeviceTypes = ['Android', 'iPhone', 'Windows', 'Mac'];

            for(let i=0; i<qty; i++) {
                let ua = "";

                let currentDevice = deviceSelection;
                if (deviceSelection === 'Random Mix') {
                    currentDevice = rand(mixDeviceTypes);
                }

                // Resolve "Auto" browser for Random Mix behind the scenes
                let currentBrowser = browser;
                if (deviceSelection === 'Random Mix') {
                    if (currentDevice === 'Android') currentBrowser = 'Chrome';
                    else if (currentDevice === 'iPhone' || currentDevice === 'Mac') currentBrowser = 'Safari';
                    else if (currentDevice === 'Windows') currentBrowser = 'Edge';
                }

                // Strict Browser Versions
                const chromeMobile = BROWSERS['ChromeMobile'];
                const chromePC = BROWSERS['ChromePC'];
                const chromeCore = (currentDevice === 'Android' || currentDevice === 'iPhone') ? chromeMobile : chromePC;
                const edgeCore = BROWSERS['Edge'];
                const firefoxCore = BROWSERS['Firefox'];
                const firefoxMajor = firefoxCore.split('.')[0];
                const operaCore = BROWSERS['Opera'];
                const safariCore = BROWSERS['Safari'];

                // ==========================================
                // BASE OS STRING CONSTRUCTION
                // ==========================================
                if (currentDevice === 'Android') {
                    let selBrand = document.querySelector('input[name="brand"]:checked').value;
                    let currentBrand = selBrand;
                    if (selBrand === 'Random' || deviceSelection === 'Random Mix') {
                        currentBrand = rand(['Samsung', 'Google', 'Motorola', 'OnePlus', 'Xiaomi', 'Oppo', 'Vivo']);
                    }
                    
                    let availableModels = ANDROID_MODELS.filter(m => m.brand === currentBrand);
                    if (availableModels.length === 0) availableModels = ANDROID_MODELS.filter(m => m.brand === 'Samsung');
                    
                    let chosenModelObj = rand(availableModels);
                    let modelName = chosenModelObj.model;
                    let androidOsVer = rand(chosenModelObj.os); 
                    let build = generateAndroidBuild();
                    
                    if (currentBrowser === 'Chrome') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    } else if (currentBrowser === 'Edge') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 EdgA/${edgeCore}`;
                    } else if (currentBrowser === 'Firefox') {
                        ua = `Mozilla/5.0 (Android ${androidOsVer}; Mobile; ${modelName} Build/${build}; rv:${firefoxMajor}.0) Gecko/${firefoxMajor}.0 Firefox/${firefoxCore}`;
                    } else if (currentBrowser === 'Opera') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 OPR/${operaCore}`;
                    } else if (currentBrowser === 'Safari') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    }

                } else if (currentDevice === 'iPhone') {
                    const safBuild = generateIOSBuild(); 

                    if (currentBrowser === 'Safari') {
                        // Strict specific format for iPhone Safari
                        ua = `Mozilla/5.0 (iPhone; CPU iPhone OS 18_7 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/26.5.2 Mobile/${safBuild} Safari/604.1`;
                    } else if (currentBrowser === 'Chrome') {
                        // Strict specific format for iPhone Chrome (if selected via Random Mix)
                        ua = `Mozilla/5.0 (iPhone; CPU iPhone OS 26_5_2 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/150.0.7871.51 Mobile/${safBuild} Safari/604.1`;
                    } else {
                        // Fallback logic for other browsers
                        const osVerUnder = rand(IOS_OS_VERSIONS);
                        const hwRand = rand(IPHONE_MODELS);
                        const base = `${hwRand}; CPU iPhone OS ${osVerUnder} like Mac OS X`;
                        
                        if (currentBrowser === 'Edge') {
                            ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${safariCore} Mobile/${safBuild} Safari/604.1 EdgiOS/${edgeCore}`;
                        } else if (currentBrowser === 'Firefox') {
                            ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${firefoxCore} Mobile/${safBuild} Safari/605.1.15`;
                        } else if (currentBrowser === 'Opera') {
                            ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) OPiOS/${operaCore} Mobile/${safBuild} Safari/605.1.15`;
                        }
                    }

                } else if (currentDevice === 'Windows' || currentDevice === 'Windows 10' || currentDevice === 'Windows 11') {
                    const base = rand(WIN_VERSIONS);

                    if (currentBrowser === 'Chrome' || currentBrowser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36`;
                    } else if (currentBrowser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 Edg/${edgeCore}`;
                    } else if (currentBrowser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}; rv:${firefoxMajor}.0) Gecko/20100101 Firefox/${firefoxCore}`;
                    } else if (currentBrowser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${operaCore}`;
                    }

                } else if (currentDevice === 'Mac') {
                    const macVer = rand(MAC_VERSIONS);
                    const base = `Macintosh; Intel Mac OS X ${macVer}`;

                    if (currentBrowser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${safariCore} Safari/605.1.15`;
                    } else if (currentBrowser === 'Chrome' || currentBrowser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36`;
                        if(currentBrowser === 'Edge') ua += ` Edg/${edgeCore}`;
                    } else if (currentBrowser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}; rv:${firefoxMajor}.0) Gecko/20100101 Firefox/${firefoxCore}`;
                    } else if (currentBrowser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${operaCore}`;
                    }
                }

                if(ua !== "") {
                    generatedUAs.push(ua);
                }
            }

            renderOutput(generatedUAs);
        }

        function renderOutput(uaList) {
            const container = document.getElementById('outputContainer');
            const emptyState = document.getElementById('emptyState');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const countDisplay = document.getElementById('resCount');

            container.innerHTML = '';
            countDisplay.innerText = uaList.length;

            if (uaList.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
                copyAllBtn.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');
            copyAllBtn.classList.remove('hidden');

            uaList.forEach((ua) => {
                const div = document.createElement('div');
                div.className = 'ua-list-item';
                
                const code = document.createElement('code');
                code.className = 'text-slate-300 font-mono text-[12px] md:text-[13px] break-all flex-grow font-semibold';
                code.textContent = ua;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'shrink-0 bg-[#020617] hover:bg-emerald-600 text-slate-300 hover:text-white border border-white/10 hover:border-emerald-500 text-xs font-bold py-2.5 px-5 rounded-xl transition-all flex items-center justify-center gap-2 w-full md:w-auto shadow-md';
                copyBtn.innerHTML = '<i class="ph-bold ph-copy text-sm"></i> Copy';
                
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(ua).then(() => {
                        const originalHtml = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="ph-bold ph-check text-emerald-400 text-sm"></i> Copied!';
                        copyBtn.classList.add('border-emerald-500');
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHtml;
                            copyBtn.classList.remove('border-emerald-500');
                        }, 2000);
                    });
                };

                div.appendChild(code);
                div.appendChild(copyBtn);
                container.appendChild(div);
            });
        }

        function copyAll() {
            const container = document.getElementById('outputContainer');
            const items = container.querySelectorAll('code');
            if (items.length === 0) return;
            
            const copyAllBtn = document.getElementById('copyAllBtn');
            const textToCopy = Array.from(items).map(code => code.textContent).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalHtml = copyAllBtn.innerHTML;
                copyAllBtn.innerHTML = '<i class="ph-bold ph-check text-white text-lg"></i> All Copied!';
                copyAllBtn.classList.replace('bg-slate-800', 'bg-emerald-600');
                
                setTimeout(() => {
                    copyAllBtn.innerHTML = originalHtml;
                    copyAllBtn.classList.replace('bg-emerald-600', 'bg-slate-800');
                }, 2000);
            });
        }
    </script>
</body>
</html>
