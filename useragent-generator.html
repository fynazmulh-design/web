                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Mobile Safari/537.36 OPR/${oVer}`;
                    }

                } else if (device === 'iPhone' || device === 'iPad') {
                    const osVerRaw = rand(VERSIONS['iOS']); 
                    const osVerUnder = osVerRaw.replace(/\./g, '_'); 
                    const hw = device === 'iPad' ? rand(HARDWARE['iPad']) : rand(HARDWARE['iPhone']);
                    const base = device === 'iPad' ? `${hw}; CPU OS ${osVerUnder} like Mac OS X` : `iPhone; CPU iPhone OS ${osVerUnder} like Mac OS X`;
                    const safBuild = rand(['15E148', '21E219', '21H20', '20B101', '20A371', '23D8133']);

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${sVer} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/${cVer} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${sVer} Mobile/${safBuild} Safari/604.1 EdgiOS/${eVer}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${fVer} Mobile/${safBuild} Safari/605.1.15`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) OPiOS/${oVer} Mobile/${safBuild} Safari/605.1.15`;
                    }

                } else if (device === 'Windows 10' || device === 'Windows 11') {
                    // Windows 11 Bypass Rule!
                    const base = device === 'Windows 11' ? 'Windows NT 11.0; Win64; x64' : 'Windows NT 10.0; Win64; x64';
                    let currentBrowser = browser === 'None' ? 'Chrome' : browser;

                    if (currentBrowser === 'Chrome' || currentBrowser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Safari/537.36`;
                    } else if (currentBrowser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Safari/537.36 Edg/${eVer}`;
                    } else if (currentBrowser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}; rv:${fVer}) Gecko/20100101 Firefox/${fVer}`;
                    } else if (currentBrowser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Safari/537.36 OPR/${oVer}`;
                    }

                } else if (device === 'Mac') {
                    const base = rand(HARDWARE['Mac']);
                    let currentBrowser = browser === 'None' ? 'Chrome' : browser;

                    if (currentBrowser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${sVer} Safari/605.1.15`;
                    } else if (currentBrowser === 'Chrome' || currentBrowser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Safari/537.36`;
                        if(currentBrowser === 'Edge') ua += ` Edg/${eVer}`;
                    } else if (currentBrowser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}; rv:${fVer}) Gecko/20100101 Firefox/${fVer}`;
                    } else if (currentBrowser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Safari/537.36 OPR/${oVer}`;
                    }
                }

                // ==========================================
                // 2. SOCIAL APP STRINGS 
                // ==========================================
                if (inapp !== 'None') {
                    let appString = "";

                    if (device === 'Android') {
                         ua = `Mozilla/5.0 (Linux; Android ${rand(VERSIONS['Android'])}; ${rand(HARDWARE[finalBrand])} Build/${generateAndroidBuild()}; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${cVer} Mobile Safari/537.36`;
                    } else if (device === 'iPhone' || device === 'iPad') {
                         const isIpad = device === 'iPad';
                         const osVerUnder = rand(VERSIONS['iOS']).replace(/\./g, '_');
                         const hw = isIpad ? rand(HARDWARE['iPad']) : rand(HARDWARE['iPhone']);
                         ua = `Mozilla/5.0 (${hw}; CPU ${isIpad?'OS':'iPhone OS'} ${osVerUnder} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${rand(['15E148', '21E219', '21H20', '23D8133'])}`;
                    }
                    
                    if (inapp === 'Facebook') {
                        const fbVer = `${rand(APP_VERSIONS['Facebook'])}.0.0.${randInt(10, 99)}.${randInt(10, 99)}`;
                        if (device === 'Android') {
                            appString = ` [FB_IAB/FB4A;FBAV/${fbVer};FBLC/${geoUnder};FBMF/${finalBrand.toLowerCase()};FBDV/${rand(HARDWARE[finalBrand])};FBSV/${rand(VERSIONS['Android'])};FBSS/1;FBID/phone;FBNG/4G;FBSR/1;FBOP/1;FBRV/0;IABMV/1]`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            const hw = device === 'iPad' ? rand(HARDWARE['iPad']) : rand(HARDWARE['iPhone']);
                            appString = ` Safari/604.1 [FBAN/FBIOS;FBAV/${fbVer};FBBV/${randInt(800000000, 999999999)};FBDV/${hw};FBMD/${device==='iPad'?'iPad':'iPhone'};FBSN/iOS;FBSV/${rand(VERSIONS['iOS']).replace(/_/g, '.')};FBSS/3;FBID/phone;FBLC/${geoUnder};FBOP/5;FBRV/${randInt(80000000, 99999999)};IABMV/1]`;
                        } else {
                            appString = ` FacebookPC/${fbVer}`;
                        }
                    } 
                    else if (inapp === 'Instagram') {
                        const igVer = `${rand(APP_VERSIONS['Instagram'])}.0.0.${randInt(10, 99)}`;
                        if (device === 'Android') {
                            const osVer = rand(VERSIONS['Android']);
                            const apiLvl = parseInt(osVer) + 20; 
                            const dpi = rand([320, 450, 560, 640]);
                            const res = rand(['1080x2400', '1440x3200', '1440x3088']);
                            const hw = rand(HARDWARE[finalBrand]);
                            appString = ` Instagram ${igVer} Android (${apiLvl}/${osVer}; ${dpi}dpi; ${res}; ${finalBrand.toLowerCase()}; ${hw}; qcom; ${geoUnder}; ${randInt(100000000, 1999999999)}; IABMV/1)`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            const osVer = rand(VERSIONS['iOS']).replace(/_/g, '.');
                            const hw = device === 'iPad' ? rand(HARDWARE['iPad']) : rand(HARDWARE['iPhone']);
                            const res = rand(['960x2079', '1170x2532', '1290x2796']);
                            appString = ` Instagram ${igVer} (${hw}; iOS ${osVer}; ${geoUnder}; en; scale=3.00; ${res}; ${randInt(1000000000, 1999999999)}; IABMV/1)`;
                        } else {
                            appString = ` InstagramPC/${igVer}`;
                        }
                    }
                    else if (inapp === 'TikTok') {
                        const ttVer = `${rand(APP_VERSIONS['TikTok'])}.${randInt(1, 9)}.${randInt(1, 9)}`;
                        if (device === 'Android') {
                            ua = `com.ss.android.ugc.trill/${randInt(440000, 450000)} (Linux; U; Android ${rand(VERSIONS['Android'])}; ${geoUnder}; ${rand(HARDWARE[finalBrand])}; Build/${generateAndroidBuild()}; Cronet/TTNetVersion:b4d74d15 2020-04-23)`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            ua = `Mozilla/5.0 (${device==='iPad'?rand(HARDWARE['iPad']):rand(HARDWARE['iPhone'])}; CPU ${device==='iPad'?'OS':'iPhone OS'} ${rand(VERSIONS['iOS']).replace(/\./g, '_')} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) TikTok/${ttVer} (iOS ${rand(VERSIONS['iOS'])}; ${geoUnder})`;
                        } else {
                            appString = ` TikTokPC/${ttVer}`; 
                        }
                    }
                    else if (inapp === 'Snapchat') {
                        const snapVer = `14.${randInt(10, 99)}.0.${randInt(10, 99)}`;
                        if (device === 'Android') {
                            ua = `Snapchat/${snapVer} (Android ${rand(VERSIONS['Android'])}; ${rand(HARDWARE[finalBrand])})`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            ua = `Snapchat/${snapVer} (iOS ${rand(VERSIONS['iOS']).replace(/_/g, '.')}; ${device==='iPad'?rand(HARDWARE['iPad']):rand(HARDWARE['iPhone'])})`;
                        } else {
                            appString = ` SnapchatPC/${snapVer}`;
                        }
                    }
                    else if (inapp === 'Twitter') {
                        const tVer = `${rand(APP_VERSIONS['Twitter'])}.${randInt(10, 99)}.0-release.${randInt(0, 9)}`;
                        if (device === 'Android') {
                            ua = `Mozilla/5.0 (Linux; Android ${rand(VERSIONS['Android'])}; ${rand(HARDWARE[finalBrand])}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Mobile Safari/537.36 TwitterAndroid/${tVer} Locale/${geoUnder}`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            ua = `Mozilla/5.0 (${device==='iPad'?rand(HARDWARE['iPad']):rand(HARDWARE['iPhone'])}; CPU ${device==='iPad'?'OS':'iPhone OS'} ${rand(VERSIONS['iOS']).replace(/\./g, '_')} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${rand(['15E148', '21E219'])} TwitteriPhone/${tVer} Locale/${geoUnder}`;
                        } else {
                            appString = ` TwitterPC/${tVer}`;
                        }
                    }
                    else if (inapp === 'LinkedIn') {
                        const inVer = rand(APP_VERSIONS['LinkedIn']);
                        if (device === 'Android') {
                            ua = `Mozilla/5.0 (Linux; Android ${rand(VERSIONS['Android'])}; ${rand(HARDWARE[finalBrand])}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${cVer} Mobile Safari/537.36 LinkedInApp/${inVer} (${geoUnder})`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            ua = `Mozilla/5.0 (${device==='iPad'?rand(HARDWARE['iPad']):rand(HARDWARE['iPhone'])}; CPU ${device==='iPad'?'OS':'iPhone OS'} ${rand(VERSIONS['iOS']).replace(/\./g, '_')} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${rand(['15E148', '21E219'])} LinkedInApp/${inVer} (${geoUnder})`;
                        } else {
                            appString = ` LinkedInPC/${inVer}`;
                        }
                    }
                    else if (inapp === 'Reddit') {
                        const rVer = device === 'Android' ? rand(APP_VERSIONS['RedditAndroid']) : rand(APP_VERSIONS['RedditIOS']) + `.${randInt(0,9)}`;
                        if (device === 'Android') {
                            ua = `Reddit/Version ${rVer}/Build ${randInt(1000000, 9999999)} (${rand(HARDWARE[finalBrand])}; Android ${rand(VERSIONS['Android'])})`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            ua = `Reddit/Version ${rVer}/Build ${randInt(1000000, 9999999)} (${device==='iPad'?rand(HARDWARE['iPad']):rand(HARDWARE['iPhone'])}; iOS ${rand(VERSIONS['iOS']).replace(/_/g, '.')})`;
                        } else {
                            appString = ` RedditPC/${rVer}`;
                        }
                    }
                    else if (inapp === 'WhatsApp') {
                        const waVer = `2.26.${randInt(10, 30)}.${randInt(10, 99)}`;
                        if (device === 'Android') {
                            ua = `WhatsApp/${waVer} A`;
                        } else if (device === 'iPhone' || device === 'iPad') {
                            ua = `WhatsApp/${waVer} i`;
                        } else {
                            appString = ` WhatsAppPC/${waVer}`;
                        }
                    }

                    ua = ua + appString;
                }

                generatedUAs.add(ua);
            }

            renderOutput(Array.from(generatedUAs));
        }

        // --- RENDERING & COPY ---
        function renderOutput(uaList) {
            const container = document.getElementById('outputContainer');
            const emptyState = document.getElementById('emptyState');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const countDisplay = document.getElementById('resCount');

            container.innerHTML = '';
            countDisplay.innerText = uaList.length;

            if (uaList.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
                copyAllBtn.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');
            copyAllBtn.classList.remove('hidden');

            uaList.forEach((ua) => {
                const div = document.createElement('div');
                div.className = 'ua-list-item';
                
                const code = document.createElement('code');
                code.className = 'text-zinc-300 font-mono text-[12px] break-all flex-grow';
                code.textContent = ua;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'shrink-0 bg-zinc-800 hover:bg-purple-600 text-zinc-300 hover:text-white border border-zinc-700 hover:border-purple-500 text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2 w-full md:w-auto';
                copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i> Copy';
                
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(ua).then(() => {
                        const originalHtml = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="ph-bold ph-check text-purple-400"></i> Copied!';
                        copyBtn.classList.add('border-purple-500');
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHtml;
                            copyBtn.classList.remove('border-purple-500');
                        }, 2000);
                    });
                };

                div.appendChild(code);
                div.appendChild(copyBtn);
                container.appendChild(div);
            });
        }

        function copyAll() {
            const container = document.getElementById('outputContainer');
            const items = container.querySelectorAll('code');
            if (items.length === 0) return;
            
            const copyAllBtn = document.getElementById('copyAllBtn');
            const textToCopy = Array.from(items).map(code => code.textContent).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalHtml = copyAllBtn.innerHTML;
                copyAllBtn.innerHTML = '<i class="ph-bold ph-check text-white"></i> All Copied!';
                copyAllBtn.classList.replace('bg-zinc-800', 'bg-purple-600');
                
                setTimeout(() => {
                    copyAllBtn.innerHTML = originalHtml;
                    copyAllBtn.classList.replace('bg-purple-600', 'bg-zinc-800');
                }, 2000);
            });
        }
    </script>
