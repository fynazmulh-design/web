    <script>
        // UI Logic for Brand Visibility
        const deviceRadios = document.querySelectorAll('input[name="device"]');
        const brandSection = document.getElementById('brandSection');
        
        deviceRadios.forEach(radio => {

                if (this.value === 'Android' || this.value === 'Random Mix') {
                    brandSection.style.display = 'block';
                } else {
                    brandSection.style.display = 'none';
                }
            });
        });

        // 2022-2026 Latest Phone Models Data
        const HARDWARE = {
            'Samsung': ['SM-S948B', 'SM-S938B', 'SM-S928B', 'SM-S918B', 'SM-S908B', 'SM-S941B', 'SM-S931B', 'SM-S921B', 'SM-S911B', 'SM-S901B', 'SM-F966B', 'SM-F956B', 'SM-F946B', 'SM-F936B', 'SM-F741B', 'SM-F731B', 'SM-A556B', 'SM-A546B', 'SM-A536B'],
            'Google': ['Pixel 10 Pro', 'Pixel 9 Pro XL', 'Pixel 9 Pro', 'Pixel 9', 'Pixel 8 Pro', 'Pixel 8', 'Pixel 8a', 'Pixel 7 Pro', 'Pixel 7', 'Pixel 6a', 'Pixel Fold'],
            'Motorola': ['motorola edge 50 ultra', 'motorola edge 50 pro', 'motorola edge 40 pro', 'motorola edge 30 ultra', 'motorola razr 50 ultra', 'motorola razr 40 ultra', 'moto g stylus 5G (2024)', 'moto g stylus 5G (2023)', 'moto g power 5G (2024)'],
            'OnePlus': ['OnePlus 13', 'OnePlus 12', 'OnePlus 11', 'OnePlus 10 Pro', 'CPH2581', 'CPH2449', 'CPH2451', 'NE2210', 'NE2213'],
            'Xiaomi': ['Xiaomi 15 Pro', 'Xiaomi 14 Ultra', 'Xiaomi 14 Pro', 'Xiaomi 13 Pro', 'Xiaomi 12 Pro', '24030PN60G', '23127PN0CG', '2210132G', 'Redmi Note 13 Pro+', 'Redmi Note 12 Pro'],
            'Oppo': ['Find X7 Ultra', 'Find X6 Pro', 'Find X5 Pro', 'Reno 11 Pro', 'Reno 10 Pro', 'Reno 8 Pro', 'CPH2529', 'CPH2499', 'PHN110'],
            'Vivo': ['X100 Pro', 'X90 Pro', 'X80 Pro', 'V29 Pro', 'V27 Pro', 'V2308', 'V2250', 'V2158'],
            'Realme': ['Realme GT 5 Pro', 'Realme GT 3', 'Realme GT 2 Pro', 'Realme 12 Pro+', 'Realme 11 Pro+', 'RMX3888', 'RMX3700'],
            'iPhone': ['iPhone17,3', 'iPhone17,2', 'iPhone17,1', 'iPhone16,2', 'iPhone16,1', 'iPhone15,3', 'iPhone15,2', 'iPhone14,7', 'iPhone14,5', 'iPhone14,3', 'iPhone14,2'],
            'iPad': ['iPad16,3', 'iPad15,3', 'iPad14,1', 'iPad13,16'],
            'Mac': ['Macintosh; Intel Mac OS X 14_0', 'Macintosh; Intel Mac OS X 15_777', 'Macintosh; Intel Mac OS X 26_5_2'],
            'Windows': ['Windows NT 10.0; Win64; x64', 'Windows NT 11.0; Win64; x64']
        };

        // Exact Versions per Prompt Request
        const VERSIONS = {
            'Android': ['15', '16', '17'],
            'iOS': ['17.0', '18.0', '26.0']
        };

        // Last two versions for each browser
        const APP_VERSIONS = {
            'Chrome': ['150.0.7871.47', '149.0.7827.159'],
            'Edge': ['150.0.4078.48', '149.0.3650.96'],
            'Opera': ['133.0.5932.20', '132.0.5729.49'],
            'Firefox': ['152.0.4', '151.0.1'],
            'Safari': ['26.5', '26.0']
        };

        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // Create highly randomized and unique build numbers
        function generateAndroidBuild() {
            const prefixes = ['UP1A', 'TP1A', 'SP1A', 'UKQ1', 'RP1A', 'CP1A', 'BP1A', 'AP3A'];
            const year = randInt(23, 26);
            const month = String(randInt(1, 12)).padStart(2, '0');
            const day = String(randInt(1, 28)).padStart(2, '0');
            const revision = String(randInt(1, 999)).padStart(3, '0');
            return `${rand(prefixes)}.${year}${month}${day}.${revision}`;
        }

        function generateUAs() {
            const qty = parseInt(document.getElementById('uaQty').value) || 10;
            const deviceSelection = document.querySelector('input[name="device"]:checked').value;
            const selBrand = document.querySelector('input[name="brand"]:checked').value;
            const browser = document.querySelector('input[name="browser"]:checked').value;

            const generatedUAs = new Set();
            let loops = 0; 
            const maxLoops = qty * 100; 

            // Device types to iterate through if Random Mix is selected
            const deviceTypes = ['Android', 'iPhone', 'iPad', 'Windows 10', 'Windows 11', 'Mac'];

            while (generatedUAs.size < qty && loops < maxLoops) {
                loops++;
                let ua = "";

                // Resolve current device (Handle Random Mix)
                let currentDevice = deviceSelection === 'Random Mix' ? rand(deviceTypes) : deviceSelection;

                // Resolve Chrome Core Version for Webkits
                const chromeCore = rand(APP_VERSIONS['Chrome']);

                // Resolve Brand for Android
                let finalBrand = selBrand;
                if (currentDevice === 'Android') {
                    if (deviceSelection === 'Random Mix' || selBrand === 'Random') {
                        finalBrand = rand(['Samsung', 'Google', 'Motorola', 'OnePlus', 'Xiaomi', 'Oppo', 'Vivo', 'Realme']);
                    }
                }

                // ==========================================
                // USER AGENT CONSTRUCTION
                // ==========================================
                if (currentDevice === 'Android') {
                    const osVer = rand(VERSIONS['Android']);
                    const hw = rand(HARDWARE[finalBrand]);
                    const build = generateAndroidBuild();
                    
                    if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (Linux; Android ${osVer}; ${hw} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${rand(APP_VERSIONS['Chrome'])} Mobile Safari/537.36`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (Linux; Android ${osVer}; ${hw} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 EdgA/${rand(APP_VERSIONS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        const ffVer = rand(APP_VERSIONS['Firefox']);
                        const ffMajor = ffVer.split('.')[0];
                        ua = `Mozilla/5.0 (Android ${osVer}; Mobile; ${hw} Build/${build}; rv:${ffMajor}.0) Gecko/${ffMajor}.0 Firefox/${ffVer}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (Linux; Android ${osVer}; ${hw} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 OPR/${rand(APP_VERSIONS['Opera'])}`;
                    } else if (browser === 'Safari') {
                        // Fallback to Chrome for Android Safari requests
                        ua = `Mozilla/5.0 (Linux; Android ${osVer}; ${hw} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    }

                } else if (currentDevice === 'iPhone' || currentDevice === 'iPad') {
                    const isIpad = currentDevice === 'iPad';
                    const osVerRaw = rand(VERSIONS['iOS']); 
                    const osVerUnder = osVerRaw.replace(/\./g, '_'); 
                    const hw = isIpad ? rand(HARDWARE['iPad']) : rand(HARDWARE['iPhone']);
                    const base = isIpad ? `${hw}; CPU OS ${osVerUnder} like Mac OS X` : `${hw}; CPU iPhone OS ${osVerUnder} like Mac OS X`;
                    const safBuild = rand(['15E148', '21E219', '21H20', '23D8133']);

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${rand(APP_VERSIONS['Safari'])} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/${rand(APP_VERSIONS['Chrome'])} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${rand(APP_VERSIONS['Safari'])} Mobile/${safBuild} Safari/604.1 EdgiOS/${rand(APP_VERSIONS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${rand(APP_VERSIONS['Firefox'])} Mobile/${safBuild} Safari/605.1.15`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) OPiOS/${rand(APP_VERSIONS['Opera'])} Mobile/${safBuild} Safari/605.1.15`;
                    }

                } else if (currentDevice === 'Windows 10' || currentDevice === 'Windows 11') {
                    const base = currentDevice === 'Windows 11' ? 'Windows NT 11.0; Win64; x64' : 'Windows NT 10.0; Win64; x64';

                    if (browser === 'Chrome' || browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${rand(APP_VERSIONS['Chrome'])} Safari/537.36`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 Edg/${rand(APP_VERSIONS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        const ffVer = rand(APP_VERSIONS['Firefox']);
                        const ffMajor = ffVer.split('.')[0];
                        ua = `Mozilla/5.0 (${base}; rv:${ffMajor}.0) Gecko/20100101 Firefox/${ffVer}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${rand(APP_VERSIONS['Opera'])}`;
                    }

                } else if (currentDevice === 'Mac') {
                    const base = rand(HARDWARE['Mac']);

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${rand(APP_VERSIONS['Safari'])} Safari/605.1.15`;
                    } else if (browser === 'Chrome' || browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${rand(APP_VERSIONS['Chrome'])} Safari/537.36`;
                        if(browser === 'Edge') ua += ` Edg/${rand(APP_VERSIONS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        const ffVer = rand(APP_VERSIONS['Firefox']);
                        const ffMajor = ffVer.split('.')[0];
                        ua = `Mozilla/5.0 (${base}; rv:${ffMajor}.0) Gecko/20100101 Firefox/${ffVer}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${rand(APP_VERSIONS['Opera'])}`;
                    }
                }

                if(ua !== "") {
                    generatedUAs.add(ua);
                }
            }

            renderOutput(Array.from(generatedUAs));
        }

        // --- RENDERING & COPY ---
        function renderOutput(uaList) {
            const container = document.getElementById('outputContainer');
            const emptyState = document.getElementById('emptyState');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const countDisplay = document.getElementById('resCount');

            container.innerHTML = '';
            countDisplay.innerText = uaList.length;

            if (uaList.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
                copyAllBtn.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');
            copyAllBtn.classList.remove('hidden');

            uaList.forEach((ua) => {
                const div = document.createElement('div');
                div.className = 'ua-list-item';
                
                const code = document.createElement('code');
                code.className = 'text-zinc-300 font-mono text-[12px] break-all flex-grow';
                code.textContent = ua;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'shrink-0 bg-zinc-800 hover:bg-purple-600 text-zinc-300 hover:text-white border border-zinc-700 hover:border-purple-500 text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2 w-full md:w-auto';
                copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i> Copy';
                
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(ua).then(() => {
                        const originalHtml = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="ph-bold ph-check text-purple-400"></i> Copied!';
                        copyBtn.classList.add('border-purple-500');
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHtml;
                            copyBtn.classList.remove('border-purple-500');
                        }, 2000);
                    });
                };

                div.appendChild(code);
                div.appendChild(copyBtn);
                container.appendChild(div);
            });
        }

        function copyAll() {
            const container = document.getElementById('outputContainer');
            const items = container.querySelectorAll('code');
            if (items.length === 0) return;
            
            const copyAllBtn = document.getElementById('copyAllBtn');
            const textToCopy = Array.from(items).map(code => code.textContent).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalHtml = copyAllBtn.innerHTML;
                copyAllBtn.innerHTML = '<i class="ph-bold ph-check text-white"></i> All Copied!';
                copyAllBtn.classList.replace('bg-zinc-800', 'bg-purple-600');
                
                setTimeout(() => {
                    copyAllBtn.innerHTML = originalHtml;
                    copyAllBtn.classList.replace('bg-purple-600', 'bg-zinc-800');
                }, 2000);
            });
        }
    </script>
</body>
</html>
