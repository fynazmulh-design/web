<script>
    (function() {
        const user = JSON.parse(localStorage.getItem('proToolsUser'));
        const now = new Date().getTime();

        if (!user || !user.isLoggedIn) {
            alert("⚠️ Please login to access premium tools!");
            window.location.replace("index.html"); 
        } 
        else if (!user.plan || user.plan === 'Free') {
            alert("🔒 Access Denied! Please buy a VIP package to unlock this tool.");
            window.location.replace("index.html"); 
        } 
        else if (user.expiry && now > user.expiry) {
            alert("⏳ Your premium package has expired! Please renew.");
            window.location.replace("index.html");
        }
    })();
</script>

    <div class="w-full min-h-screen pt-[100px] pb-10 px-4 md:px-6 flex flex-col lg:flex-row gap-6 max-w-[1600px] mx-auto">

            <div class="mt-4">

                <button onclick="generateUAs()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold text-[15px] rounded-xl hover:opacity-90 transition-opacity shadow-[0_0_20px_rgba(168,85,247,0.3)] flex items-center justify-center gap-2">
                    <i class="ph-bold ph-lightning"></i> Generate UA

        </div>

        <div class="w-full lg:w-[55%] neon-panel flex flex-col relative overflow-hidden bg-[#09090b]" style="min-height: 700px;">
            <div class="px-6 py-4 border-b border-zinc-800 flex justify-between items-center bg-[#12121a] shrink-0">
                <h2 class="text-sm font-bold text-white flex items-center gap-2"><i class="ph-bold ph-terminal-window text-purple-400"></i> Output List (<span id="resCount">0</span>)</h2>
                <button onclick="copyAll()" id="copyAllBtn" class="bg-zinc-800 hover:bg-purple-600 text-white transition flex items-center gap-2 text-xs font-bold px-4 py-2 rounded-lg hidden border border-zinc-700 hover:border-purple-500">
                    <i class="ph-bold ph-copy-all"></i> Copy All
                </button>
            </div>
            
            <div class="relative flex-grow p-4 md:p-6 overflow-hidden flex flex-col">
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-zinc-500 my-auto">
                    <div class="w-3 h-3 bg-purple-600 rounded-full mx-auto shadow-[0_0_15px_rgba(168,85,247,0.8)] animate-pulse mb-4"></div>
                    <p class="text-sm">Select parameters and generate...</p>
                </div>
                
                <div id="outputContainer" class="flex-grow overflow-y-auto space-y-3 pr-2 hidden">
                </div>

    </div>

    <script>
        // --- DATABASE ---
        const ANDROID_MODELS = [
            // Samsung Models
            { brand: 'Samsung', model: 'SM-S938B', os: ['15', '16', '17'] }, // Galaxy S25 Ultra
            { brand: 'Samsung', model: 'SM-S936B', os: ['15', '16', '17'] }, // Galaxy S25+
            { brand: 'Samsung', model: 'SM-S931B', os: ['15', '16', '17'] }, // Galaxy S25
            { brand: 'Samsung', model: 'SM-S928B', os: ['14', '15', '16', '17'] }, // Galaxy S24 Ultra
            { brand: 'Samsung', model: 'SM-S926B', os: ['14', '15', '16', '17'] }, // Galaxy S24+
            { brand: 'Samsung', model: 'SM-S921B', os: ['14', '15', '16', '17'] }, // Galaxy S24
            { brand: 'Samsung', model: 'SM-S918B', os: ['13', '14', '15', '16'] }, // Galaxy S23 Ultra
            { brand: 'Samsung', model: 'SM-S911B', os: ['13', '14', '15', '16'] }, // Galaxy S23
            { brand: 'Samsung', model: 'SM-S901B', os: ['16'] }, // Galaxy S22 - STRICT 16
            { brand: 'Samsung', model: 'SM-G998B', os: ['13', '14', '15'] }, // Galaxy S21 Ultra
            { brand: 'Samsung', model: 'SM-G991B', os: ['13', '14', '15'] }, // Galaxy S21
            { brand: 'Samsung', model: 'SM-G981B', os: ['13'] }, // Galaxy S20 - STRICT 13
            { brand: 'Samsung', model: 'SM-F966B', os: ['15', '16', '17'] }, // Z Fold 7
            { brand: 'Samsung', model: 'SM-F956B', os: ['14', '15', '16', '17'] }, // Z Fold 6
            { brand: 'Samsung', model: 'SM-F946B', os: ['13', '14', '15', '16'] }, // Z Fold 5
            { brand: 'Samsung', model: 'SM-F741B', os: ['14', '15', '16', '17'] }, // Z Flip 6
            { brand: 'Samsung', model: 'SM-F731B', os: ['13', '14', '15', '16'] }, // Z Flip 5
            { brand: 'Samsung', model: 'SM-A556B', os: ['14', '15', '16'] }, // Galaxy A55
            { brand: 'Samsung', model: 'SM-A546B', os: ['13', '14', '15', '16'] }, // Galaxy A54
            { brand: 'Samsung', model: 'SM-A356B', os: ['14', '15', '16'] }, // Galaxy A35
            
            // Google Pixel Models
            { brand: 'Google', model: 'Pixel 10 Pro', os: ['15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 10', os: ['15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 9 Pro XL', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 9 Pro Fold', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 9 Pro', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 9', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 8 Pro', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 8', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 8a', os: ['14', '15', '16', '17'] },
            { brand: 'Google', model: 'Pixel 7 Pro', os: ['13', '14', '15', '16'] },
            { brand: 'Google', model: 'Pixel 7', os: ['13', '14', '15', '16'] },
            { brand: 'Google', model: 'Pixel 7a', os: ['13', '14', '15', '16'] },
            { brand: 'Google', model: 'Pixel 6 Pro', os: ['13', '14', '15'] },
            { brand: 'Google', model: 'Pixel Fold', os: ['13', '14', '15', '16'] }
        ];

        const IPHONE_MODELS = [
            'iPhone17,1', 'iPhone17,2', 'iPhone17,3', 'iPhone17,4', // iPhone 16 series
            'iPhone16,2', 'iPhone15,3', 'iPhone14,7', 'iPhone14,2'
        ];
        const IOS_VERSIONS = ['17_5_1', '18_3_1', '26_0'];

        const MAC_VERSIONS = ['14_0', '15_777', '26_5_2']; 
        const WIN_VERSIONS = ['Windows NT 10.0; Win64; x64', 'Windows NT 11.0; Win64; x64'];

        const BROWSERS = {
            'Chrome': ['150.0.7871.47', '149.0.7827.159'],
            'Edge': ['150.0.4078.48', '149.0.3650.96'],
            'Opera': ['133.0.5932.20', '132.0.5729.49'],
            'Firefox': ['152.0.4', '151.0.1'],
            'Safari': ['26.5', '26.0']
        };

        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // Generate highly random and unlimited unique build numbers
        function generateAndroidBuild() {
            const prefixes = ['UP1A', 'TP1A', 'SP1A', 'UKQ1', 'RP1A', 'CP1A', 'BP1A', 'AP3A'];
            const year = randInt(23, 26);
            const month = String(randInt(1, 12)).padStart(2, '0');
            const day = String(randInt(1, 28)).padStart(2, '0');
            const revision = String(randInt(1, 999)).padStart(3, '0');
            const suffix = rand(['', '.A1', '.A2', '.B3']);
            return `${rand(prefixes)}.${year}${month}${day}.${revision}${suffix}`;
        }

        function generateUAs() {
            const qty = parseInt(document.getElementById('uaQty').value) || 10;
            const deviceSelection = document.querySelector('input[name="device"]:checked').value;
            const browser = document.querySelector('input[name="browser"]:checked').value;

            const generatedUAs = new Set();
            let loops = 0; 
            const maxLoops = qty * 100; 

            // Device types to iterate through if Random Mix is selected
            const mixDeviceTypes = ['Android', 'iPhone', 'Windows', 'Mac'];

            while (generatedUAs.size < qty && loops < maxLoops) {
                loops++;
                let ua = "";

                // Resolve current device (Handle Random Mix)
                let currentDevice = deviceSelection;
                if (deviceSelection === 'Random Mix') {
                    currentDevice = rand(mixDeviceTypes);
                }

                // Setup Chrome Core string for webkit-based browsers
                const chromeCore = rand(BROWSERS['Chrome']);

                if (currentDevice === 'Android') {
                    // Strictly pick Samsung or Google Pixel
                    let currentBrand = rand(['Samsung', 'Google']);
                    
                    let availableModels = ANDROID_MODELS.filter(m => m.brand === currentBrand);
                    let chosenModelObj = rand(availableModels);
                    
                    let modelName = chosenModelObj.model;
                    let androidOsVer = rand(chosenModelObj.os);
                    let build = generateAndroidBuild();
                    
                    if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 EdgA/${rand(BROWSERS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        const ffVer = rand(BROWSERS['Firefox']);
                        const ffMajor = ffVer.split('.')[0];
                        ua = `Mozilla/5.0 (Android ${androidOsVer}; Mobile; ${modelName} Build/${build}; rv:${ffMajor}.0) Gecko/${ffMajor}.0 Firefox/${ffVer}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 OPR/${rand(BROWSERS['Opera'])}`;
                    } else if (browser === 'Safari') {
                        // Fallback to Chrome format for Android Webkit Safari requests
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    }

                } else if (currentDevice === 'iPhone') {
                    const osVerRaw = rand(IOS_VERSIONS); 
                    const osVerUnder = osVerRaw; // e.g. 18_3_1
                    const osVerDot = osVerRaw.replace(/_/g, '.'); // e.g. 18.3.1
                    const hw = rand(IPHONE_MODELS);
                    const base = `${hw}; CPU iPhone OS ${osVerUnder} like Mac OS X`;
                    const safBuild = rand(['15E148', '21E219', '21H20', '23D8133']);

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${rand(BROWSERS['Safari'])} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/${chromeCore} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${rand(BROWSERS['Safari'])} Mobile/${safBuild} Safari/604.1 EdgiOS/${rand(BROWSERS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${rand(BROWSERS['Firefox'])} Mobile/${safBuild} Safari/605.1.15`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) OPiOS/${rand(BROWSERS['Opera'])} Mobile/${safBuild} Safari/605.1.15`;
                    }

                } else if (currentDevice === 'Windows') {
                    const base = rand(WIN_VERSIONS);

                    if (browser === 'Chrome' || browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 Edg/${rand(BROWSERS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        const ffVer = rand(BROWSERS['Firefox']);
                        const ffMajor = ffVer.split('.')[0];
                        ua = `Mozilla/5.0 (${base}; rv:${ffMajor}.0) Gecko/20100101 Firefox/${ffVer}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${rand(BROWSERS['Opera'])}`;
                    }

                } else if (currentDevice === 'Mac') {
                    const base = `Macintosh; Intel Mac OS X ${rand(MAC_VERSIONS)}`;

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${rand(BROWSERS['Safari'])} Safari/605.1.15`;
                    } else if (browser === 'Chrome' || browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36`;
                        if(browser === 'Edge') ua += ` Edg/${rand(BROWSERS['Edge'])}`;
                    } else if (browser === 'Firefox') {
                        const ffVer = rand(BROWSERS['Firefox']);
                        const ffMajor = ffVer.split('.')[0];
                        ua = `Mozilla/5.0 (${base}; rv:${ffMajor}.0) Gecko/20100101 Firefox/${ffVer}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${rand(BROWSERS['Opera'])}`;
                    }
                }

                if(ua !== "") {
                    generatedUAs.add(ua);
                }
            }

            renderOutput(Array.from(generatedUAs));
        }

        function renderOutput(uaList) {
            const container = document.getElementById('outputContainer');
            const emptyState = document.getElementById('emptyState');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const countDisplay = document.getElementById('resCount');

            container.innerHTML = '';
            countDisplay.innerText = uaList.length;

            if (uaList.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
                copyAllBtn.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');
            copyAllBtn.classList.remove('hidden');

            uaList.forEach((ua) => {
                const div = document.createElement('div');
                div.className = 'ua-list-item';
                
                const code = document.createElement('code');
                code.className = 'text-zinc-300 font-mono text-[12px] break-all flex-grow';
                code.textContent = ua;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'shrink-0 bg-zinc-800 hover:bg-purple-600 text-zinc-300 hover:text-white border border-zinc-700 hover:border-purple-500 text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center justify-center gap-2 w-full md:w-auto';
                copyBtn.innerHTML = '<i class="ph-bold ph-copy"></i> Copy';
                
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(ua).then(() => {
                        const originalHtml = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="ph-bold ph-check text-purple-400"></i> Copied!';
                        copyBtn.classList.add('border-purple-500');
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHtml;
                            copyBtn.classList.remove('border-purple-500');
                        }, 2000);
                    });
                };

                div.appendChild(code);
                div.appendChild(copyBtn);
                container.appendChild(div);
            });
        }

        function copyAll() {
            const container = document.getElementById('outputContainer');
            const items = container.querySelectorAll('code');
            if (items.length === 0) return;
            
            const copyAllBtn = document.getElementById('copyAllBtn');
            const textToCopy = Array.from(items).map(code => code.textContent).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalHtml = copyAllBtn.innerHTML;
                copyAllBtn.innerHTML = '<i class="ph-bold ph-check text-white"></i> All Copied!';
                copyAllBtn.classList.replace('bg-zinc-800', 'bg-purple-600');
                
                setTimeout(() => {
                    copyAllBtn.innerHTML = originalHtml;
                    copyAllBtn.classList.replace('bg-purple-600', 'bg-zinc-800');
                }, 2000);
            });
        }
    </script>
</body>
